    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        let finalBytes = bytes;

            const reader = ds.readable.getReader();

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

1a0-4c5e-a6c7-c8eb2dc85ec3\" data-bind-logo=\"\" alt=\"FynUp Consulting\"><\u002Fdiv>\n    <div class=\"sidebar-title\">Glossaire<\u002Fdiv>\n    <div class=\"sidebar-subtitle\">10 termes financiers essentiels pour entrepreneurs suisses<\u002Fdiv>\n  <\u002Fdiv>\n\n  <nav class=\"nav\" id=\"nav\"><\u002Fnav>\n\n  <div class=\"sidebar-footer\">\n    Édité par <a href=\"#\" data-go=\"final\">FynUp Consulting<\u002Fa><br>\n    <span style=\"opacity:0.6\">fynup-consulting.ch<\u002Fspan>\n  <\u002Fdiv>\n<\u002Faside>\n\n<main class=\"main\" id=\"main\">\n  <div class=\"topbar\">\n    <div class=\"topbar-left\">\n      <span>Guide pratique · entrepreneurs &amp; PME<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"progress\">\n      <span class=\"progress-text\" id=\"progressText\">1 / 11<\u002Fspan>\n      <div class=\"progress-bar\"><div class=\"progress-fill\" id=\"progressFill\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Pages get injected here -->\n  <div id=\"pages\"><\u002Fdiv>\n\n  <div class=\"pager\">\n    <button id=\"prevBtn\" aria-label=\"Précédent\">←<\u002Fbutton>\n    <button id=\"nextBtn\" aria-label=\"Suivant\">→<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<script>\nconst TERMS = [\n  {\n    id: 'cashflow',\n    name: 'Cash Flow',\n    emoji: '💸',\n    def: \"Le <strong>cash flow<\u002Fstrong>, c'est l'argent qui entre et qui sort de votre entreprise sur une période donnée. Bref : combien il vous reste vraiment en banque à la fin du mois.\",\n    example: {\n      amount: '+ 12 400.–',\n      body: \"Un café-restaurant à Lausanne encaisse <strong>CHF 48 000<\u002Fstrong> sur le mois, paie <strong>CHF 35 600<\u002Fstrong> de fournisseurs, loyer et salaires. Son cash flow mensuel est de <strong>+ CHF 12 400<\u002Fstrong>.\"\n    },\n    tip: \"Suivez votre cash flow chaque <strong>vendredi soir<\u002Fstrong>, pas en fin de mois. Un trou de trésorerie repéré tôt = un appel à votre banque évité au pire moment.\"\n  },\n  {\n    id: 'marge-brute',\n    name: 'Marge brute',\n    emoji: '📊',\n    def: \"C'est ce qu'il reste de votre chiffre d'affaires une fois retirés les coûts directs (matières, marchandises). C'est le premier vrai indicateur que votre modèle gagne de l'argent.\",\n    example: {\n      amount: '62 %',\n      body: \"Vous vendez un produit à <strong>CHF 100<\u002Fstrong>. Il vous coûte <strong>CHF 38<\u002Fstrong> à fabriquer ou acheter. Votre marge brute est de <strong>CHF 62<\u002Fstrong>, soit <strong>62 %<\u002Fstrong>.\"\n    },\n    tip: \"En Suisse, visez au moins <strong>40 %<\u002Fstrong> de marge brute en services et <strong>30 %<\u002Fstrong> en commerce. Sous ces seuils, vos charges fixes vont vite vous étrangler.\"\n  },\n  {\n    id: 'seuil-rentabilite',\n    name: 'Seuil de rentabilité',\n    emoji: '⚖️',\n    def: \"Aussi appelé <em>break-even<\u002Fem>. C'est le chiffre d'affaires minimum à réaliser pour que votre entreprise ne perde pas d'argent. En dessous : vous coulez. Au-dessus : ça commence à devenir intéressant.\",\n    example: {\n      amount: '18 750.–',\n      body: \"Charges fixes mensuelles : <strong>CHF 12 000<\u002Fstrong> (loyer, salaires, assurances). Marge brute : <strong>64 %<\u002Fstrong>. Seuil = 12 000 / 0.64 = <strong>CHF 18 750<\u002Fstrong> de CA / mois pour ne rien perdre.\"\n    },\n    tip: \"Calculez-le <strong>avant<\u002Fstrong> de signer un nouveau bail ou d'embaucher. Si votre seuil monte trop vite, dites non — même si le local de la Bahnhofstrasse est joli.\"\n  },\n  {\n    id: 'bfr',\n    name: 'BFR',\n    emoji: '🔄',\n    def: \"Le <strong>Besoin en Fonds de Roulement<\u002Fstrong>, c'est l'argent qu'il vous faut pour faire tourner la boutique entre le moment où vous payez vos fournisseurs et celui où vos clients vous paient.\",\n    example: {\n      amount: '24 000.–',\n      body: \"Stocks moyens : <strong>CHF 18 000<\u002Fstrong>. Clients qui paient à 30 jours : <strong>CHF 22 000<\u002Fstrong>. Fournisseurs payés à 15 jours : <strong>CHF 16 000<\u002Fstrong>. BFR = 18 000 + 22 000 − 16 000 = <strong>CHF 24 000<\u002Fstrong>.\"\n    },\n    tip: \"Négociez <strong>plus longs<\u002Fstrong> avec vos fournisseurs, <strong>plus courts<\u002Fstrong> avec vos clients. Chaque jour gagné, c'est de la trésorerie qui dort dans votre poche au lieu de la leur.\"\n  },\n  {\n    id: 'fonds-roulement',\n    name: 'Fonds de roulement',\n    emoji: '🏦',\n    def: \"C'est votre réserve financière stable, calculée comme la différence entre vos ressources long terme (capital + dettes long terme) et vos actifs immobilisés. En clair : votre matelas de sécurité.\",\n    example: {\n      amount: '45 000.–',\n      body: \"Capital + emprunt LT : <strong>CHF 120 000<\u002Fstrong>. Machines, véhicules, mobilier : <strong>CHF 75 000<\u002Fstrong>. Fonds de roulement = <strong>CHF 45 000<\u002Fstrong>. C'est ce qui couvre votre BFR.\"\n    },\n    tip: \"Règle d'or : votre fonds de roulement doit être <strong>supérieur<\u002Fstrong> à votre BFR. Sinon, vous financez du court terme avec du court terme — recette express pour la faillite.\"\n  },\n  {\n    id: 'roi',\n    name: 'ROI',\n    emoji: '🎯',\n    def: \"<strong>Return on Investment<\u002Fstrong> : combien vous rapporte chaque franc investi, en pourcentage. C'est le juge de paix de toutes vos décisions de dépense.\",\n    example: {\n      amount: '180 %',\n      body: \"Vous investissez <strong>CHF 5 000<\u002Fstrong> dans une campagne LinkedIn. Elle génère <strong>CHF 14 000<\u002Fstrong> de chiffre d'affaires nouveau. ROI = (14 000 − 5 000) / 5 000 = <strong>180 %<\u002Fstrong>. 🔥\"\n    },\n    tip: \"Avant chaque investissement, écrivez le ROI <strong>attendu<\u002Fstrong> sur un Post-it. Six mois après, comparez avec le réel. Vous deviendrez très vite meilleur — ou très humble.\"\n  },\n  {\n    id: 'liquidite',\n    name: 'Liquidité',\n    emoji: '💧',\n    def: \"C'est votre capacité à payer ce que vous devez <em>maintenant<\u002Fem>. Une entreprise peut être rentable sur le papier et faire faillite parce qu'elle n'a plus de cash en compte. Vrai histoire.\",\n    example: {\n      amount: '1.8',\n      body: \"Actifs à court terme (cash + créances + stocks) : <strong>CHF 90 000<\u002Fstrong>. Dettes à court terme : <strong>CHF 50 000<\u002Fstrong>. Ratio de liquidité = <strong>1.8<\u002Fstrong>. Confortable.\"\n    },\n    tip: \"Visez un ratio de liquidité <strong>entre 1.5 et 2<\u002Fstrong>. En dessous de 1, vous êtes en danger. Au-dessus de 3, vous laissez du cash dormir au lieu de l'investir.\"\n  },\n  {\n    id: 'amortissement',\n    name: 'Amortissement',\n    emoji: '📉',\n    def: \"C'est la façon comptable d'étaler le coût d'un gros achat sur sa durée de vie. Une machine à <strong>CHF 50 000<\u002Fstrong> ne disparaît pas du bilan en une fois — elle se déprécie chaque année.\",\n    example: {\n      amount: '10 000.– /an',\n      body: \"Vous achetez une fourgonnette à <strong>CHF 50 000<\u002Fstrong>, amortie sur <strong>5 ans<\u002Fstrong>. Chaque année, vous passez <strong>CHF 10 000<\u002Fstrong> en charge d'amortissement. Votre bénéfice imposable baisse d'autant.\"\n    },\n    tip: \"L'amortissement <strong>réduit votre impôt<\u002Fstrong> mais ne sort pas de cash. C'est l'une des rares choses qui font sourire un patron suisse en remplissant sa déclaration. 😏\"\n  },\n  {\n    id: 'tva',\n    name: 'TVA suisse',\n    emoji: '🧾',\n    def: \"Taxe sur la Valeur Ajoutée. Depuis 2024, le taux standard est de <strong>8.1 %<\u002Fstrong>. Vous la collectez pour la Confédération auprès de vos clients, puis vous la reversez. Spoiler : ce n'est <em>jamais<\u002Fem> votre argent.\",\n    example: {\n      amount: '8.1 %',\n      body: \"Vous facturez une prestation <strong>CHF 10 000 HT<\u002Fstrong>. Vous encaissez <strong>CHF 10 810<\u002Fstrong> TTC. Les <strong>CHF 810<\u002Fstrong> de TVA partent à l'AFC. Assujettissement obligatoire dès <strong>CHF 100 000<\u002Fstrong> de CA annuel.\"\n    },\n    tip: \"Ouvrez un <strong>compte bancaire séparé<\u002Fstrong> et virez-y la TVA chaque semaine. Le jour où l'AFC sonne, vous serez le seul dans la pièce à dormir tranquille.\"\n  },\n  {\n    id: 'pilier',\n    name: '3ème pilier',\n    emoji: '🏔️',\n    def: \"La prévoyance individuelle suisse. Vous y versez de l'argent volontairement pour votre retraite, et vous le déduisez de vos impôts. Le seul cadeau fiscal que l'État vous offre <em>chaque année<\u002Fem>.\",\n    example: {\n      amount: '7 258.–',\n      body: \"Un salarié affilié à une caisse de pension peut verser jusqu'à <strong>CHF 7 258<\u002Fstrong> par an sur un 3a. Pour un indépendant sans LPP : jusqu'à <strong>20 %<\u002Fstrong> du revenu, plafonné à <strong>CHF 36 288<\u002Fstrong>. Économie d'impôt directe.\"\n    },\n    tip: \"Ouvrez <strong>plusieurs comptes 3a<\u002Fstrong> (3 à 5) plutôt qu'un seul. À la retraite, vous les retirerez sur plusieurs années pour casser la progression fiscale. Petit hack 100 % légal.\",\n    news: {\n      badge: \"Bon à savoir\",\n      title: \"Le rachat rétroactif débarque 🎉\",\n      body: \"Depuis le <strong>1er janvier 2026<\u002Fstrong>, vous pouvez combler les années où vous n'avez pas versé le maximum, à partir de 2025 et jusqu'à <strong>10 ans en arrière<\u002Fstrong>. Concrètement : un salarié peut verser jusqu'à <strong>CHF 14'516<\u002Fstrong> en 2026 (cotisation ordinaire + rachat d'une année). Conditions : revenu AVS sur les deux années, et le plafond ordinaire de l'année en cours doit être versé en premier.\"\n    }\n  }\n];\n\nconst $nav = document.getElementById('nav');\nconst $pages = document.getElementById('pages');\nconst $progressFill = document.getElementById('progressFill');\nconst $progressText = document.getElementById('progressText');\nconst $prev = document.getElementById('prevBtn');\nconst $next = document.getElementById('nextBtn');\nconst $main = document.getElementById('main');\n\nconst INTRO_IDX = 0;\nconst FINAL_IDX = TERMS.length + 1;\nconst total = TERMS.length + 2; // intro + terms + final\n\n// Build sidebar\nconst introNav = document.createElement('div');\nintroNav.className = 'nav-item';\nintroNav.dataset.idx = INTRO_IDX;\nintroNav.innerHTML = `<span class=\"nav-num\" style=\"background:transparent;color:#00A6D6;border:1px solid rgba(0,166,214,0.4)\">👋<\u002Fspan><span>Introduction<\u002Fspan>`;\nintroNav.addEventListener('click', () => goTo(INTRO_IDX));\n$nav.appendChild(introNav);\n\nTERMS.forEach((t, i) => {\n  const idx = i + 1;\n  const el = document.createElement('div');\n  el.className = 'nav-item';\n  el.dataset.idx = idx;\n  el.innerHTML = `<span class=\"nav-num\">${String(i+1).padStart(2,'0')}<\u002Fspan><span>${t.name}<\u002Fspan>`;\n  el.addEventListener('click', () => goTo(idx));\n  $nav.appendChild(el);\n});\nconst finalNav = document.createElement('div');\nfinalNav.className = 'nav-item final';\nfinalNav.dataset.idx = FINAL_IDX;\nfinalNav.innerHTML = `<span class=\"nav-num\" style=\"background:transparent;color:#00A6D6;border:1px solid rgba(0,166,214,0.4)\">✦<\u002Fspan><span>À propos · FynUp<\u002Fspan>`;\nfinalNav.addEventListener('click', () => goTo(FINAL_IDX));\n$nav.appendChild(finalNav);\n\n// Build intro page\nconst introPage = document.createElement('section');\nintroPage.className = 'page intro-page';\nintroPage.dataset.idx = INTRO_IDX;\nintroPage.innerHTML = `\n  <div class=\"intro-eyebrow\">✦ Guide FynUp<\u002Fdiv>\n  <h1 class=\"intro-title\">Gérer une boîte en Suisse, <span>c'est tout sauf simple.<\u002Fspan><\u002Fh1>\n  <p class=\"intro-lead\">Entre la <strong>compta<\u002Fstrong> qui s'empile, les <strong>fournisseurs<\u002Fstrong> à payer, les <strong>clients<\u002Fstrong> qui traînent, la <strong>TVA<\u002Fstrong> à reverser et la <strong>fiduciaire<\u002Fstrong> qui parle un dialecte bizarre… on finit par hocher la tête à des termes qu'on ne comprend qu'à moitié.<\u002Fp>\n  <p class=\"intro-lead\">Ce guide est là pour <strong>changer ça<\u002Fstrong>. 10 termes financiers essentiels, expliqués <strong>simplement<\u002Fstrong>, avec un exemple en CHF et un tip pratique. Pas de jargon, pas de blabla — juste ce qu'il faut savoir pour piloter votre entreprise les yeux ouverts.<\u002Fp>\n  <div class=\"intro-quote\">« Un entrepreneur qui maîtrise son cash flow dort mieux qu'un entrepreneur qui maîtrise son discours commercial. » — pas Warren Buffett, mais ça aurait pu.<\u002Fdiv>\n  <div class=\"intro-features\">\n    <div class=\"intro-feat\">\n      <div class=\"intro-feat-icon\">10<\u002Fdiv>\n      <h4>Termes essentiels<\u002Fh4>\n      <p>Cash flow, BFR, ROI, TVA, 3ème pilier… le vocabulaire qui revient tout le temps.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"intro-feat\">\n      <div class=\"intro-feat-icon\">CHF<\u002Fdiv>\n      <h4>Exemples concrets<\u002Fh4>\n      <p>Chaque terme illustré avec un cas chiffré en francs suisses, ancré dans la réalité PME.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"intro-feat\">\n      <div class=\"intro-feat-icon\">💡<\u002Fdiv>\n      <h4>Tips actionnables<\u002Fh4>\n      <p>Un conseil pratique par terme, à appliquer dès demain matin — pas dans 6 mois.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"intro-cta\" id=\"introCta\">Commencer la lecture →<\u002Fbutton>\n  <p class=\"intro-meta\">Lecture estimée : <strong>≈ 8 min<\u002Fstrong> · 10 termes essentiels<\u002Fp>\n`;\n$pages.appendChild(introPage);\n\n// Build pages\nTERMS.forEach((t, i) => {\n  const idx = i + 1;\n  const page = document.createElement('section');\n  page.className = 'page';\n  page.dataset.idx = idx;\n  page.innerHTML = `\n    <div class=\"ghost-num\">${String(i+1).padStart(2,'0')}<\u002Fdiv>\n    <div class=\"term-num\">Terme ${String(i+1).padStart(2,'0')} sur 10<\u002Fdiv>\n    <h1 class=\"term-title\">${t.name}<span class=\"term-emoji\">${t.emoji}<\u002Fspan><\u002Fh1>\n    <p class=\"term-def\">${t.def}<\u002Fp>\n    <div class=\"cards\">\n      <div class=\"card card-example\">\n        <div class=\"card-icon\">CHF<\u002Fdiv>\n        <div class=\"card-label\"><span class=\"dot\"><\u002Fspan>Exemple concret<\u002Fdiv>\n        <div class=\"card-amount\"><span class=\"chf\">CHF<\u002Fspan>${t.example.amount}<\u002Fdiv>\n        <div class=\"card-body\">${t.example.body}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card card-tip\">\n        <div class=\"card-icon\">💡<\u002Fdiv>\n        <div class=\"card-label\"><span class=\"dot\"><\u002Fspan>Le tip FynUp<\u002Fdiv>\n        <div class=\"card-body\">${t.tip}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${t.news ? `\n      <div class=\"news-banner\">\n        <div class=\"news-stripe\"><\u002Fdiv>\n        <div class=\"news-content\">\n          <div class=\"news-head\">\n            <span class=\"news-badge\">✦ ${t.news.badge}<\u002Fspan>\n            <h3 class=\"news-title\">${t.news.title}<\u002Fh3>\n          <\u002Fdiv>\n          <p class=\"news-body\">${t.news.body}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    ` : ''}\n  `;\n  $pages.appendChild(page);\n});\n\n// Final page\nconst finalPage = document.createElement('section');\nfinalPage.className = 'page final-page';\nfinalPage.dataset.idx = FINAL_IDX;\nfinalPage.innerHTML = `\n  <div class=\"final-inner\">\n    <div class=\"final-logo\"><img src=\"${window.__resources.logo}\" alt=\"FynUp Consulting\"><\u002Fdiv>\n    <h1 class=\"final-tagline\">Votre partenaire <span>financier digital<\u002Fspan> en Suisse.<\u002Fh1>\n    <p class=\"final-sub\">On simplifie la finance, vous pilotez votre entreprise.<\u002Fp>\n    <a href=\"https://fynup-consulting.ch\" target=\"_blank\" rel=\"noopener\" class=\"final-cta\">\n      Découvrir FynUp Consulting →\n    <\u002Fa>\n    <div class=\"final-footer\">\n      <div class=\"final-footer-item\">\n        <div class=\"label\">Site<\u002Fdiv>\n        <div class=\"value turq\">fynup-consulting.ch<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n`;\n$pages.appendChild(finalPage);\n\nlet current = 0;\n\nfunction goTo(i) {\n  if (i < 0 || i >= total) return;\n  current = i;\n  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', +p.dataset.idx === i));\n  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', +n.dataset.idx === i));\n  const pct = ((i + 1) / total) * 100;\n  $progressFill.style.width = pct + '%';\n  $progressText.textContent = `${i+1} / ${total}`;\n  $prev.disabled = i === 0;\n  $next.disabled = i === total - 1;\n  $main.scrollTo({top: 0, behavior: 'smooth'});\n}\n\n// Intro CTA\ndocument.getElementById('introCta').addEventListener('click', () => goTo(1));\n\n$prev.addEventListener('click', () => goTo(current - 1));\n$next.addEventListener('click', () => goTo(current + 1));\n\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'ArrowRight' || e.key === 'PageDown') goTo(current + 1);\n  if (e.key === 'ArrowLeft' || e.key === 'PageUp') goTo(current - 1);\n});\n\n// Sidebar footer link\ndocument.querySelectorAll('[data-go=\"final\"]').forEach(el => {\n  el.addEventListener('click', (e) => { e.preventDefault(); goTo(FINAL_IDX); });\n});\n\ngoTo(0);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
